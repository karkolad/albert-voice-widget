<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>Albert AI – Hlasový asistent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, sans-serif;
      background: #f8fafc;
      color: #1e293b;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }

    .logo {
      position: absolute;
      top: 2rem;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #94a3b8;
    }

    .container {
      text-align: center;
      padding: 2rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: #0f172a;
    }

    .status {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 2.5rem;
      min-height: 1.4em;
    }

    .status.active { color: #2563eb; font-weight: 500; }
    .status.ended  { color: #64748b; }

    .call-btn {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      border: none;
      background: #2563eb;
      color: white;
      font-size: 3rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 1.5rem;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      box-shadow: 0 4px 24px rgba(37, 99, 235, 0.3);
    }

    .call-btn:hover { transform: scale(1.05); box-shadow: 0 6px 32px rgba(37, 99, 235, 0.4); }
    .call-btn:active { transform: scale(0.97); }
    .call-btn.active { background: #dc2626; box-shadow: 0 4px 24px rgba(220, 38, 38, 0.3); }
    .call-btn:disabled { background: #94a3b8; box-shadow: none; cursor: not-allowed; }

    .call-label {
      font-size: 1rem;
      font-weight: 500;
      color: #475569;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 24px rgba(37, 99, 235, 0.3); }
      50% { box-shadow: 0 4px 40px rgba(37, 99, 235, 0.5); }
    }

    .call-btn.connecting { animation: pulse 1.5s ease-in-out infinite; }
  </style>
</head>
<body>
  <div class="logo">KARKALAND</div>

  <div class="container">
    <h1>Albert AI</h1>
    <p class="status" id="status">Připraveno</p>

    <button class="call-btn" id="callBtn" aria-label="Zavolat Albertovi">🎙️</button>
    <p class="call-label" id="callLabel">Zavolat Albertovi</p>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
